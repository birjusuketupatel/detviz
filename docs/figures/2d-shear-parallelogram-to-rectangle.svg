<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-labelledby="slide-title slide-desc">
<style>
  .figure-vector-label,
  .figure-area-label,
  .figure-axis-label {
    font-family: Arial, Helvetica, sans-serif;
  }

  .figure-vector-label {
    font-size: 15px;
    font-weight: 600;
  }

  .figure-vector-label.red {
    fill: #d1495b;
  }

  .figure-vector-label.green {
    fill: #2c7a55;
  }

  .figure-area-label {
    fill: #0c3f31;
    font-size: 18px;
    font-weight: 700;
  }

  .figure-axis-label {
    fill: #58656a;
    font-size: 15px;
    font-weight: 600;
  }

  .figure-vertex-label {
    fill: #58656a;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    font-weight: 600;
  }

  .slide-parallelogram {
    fill: rgba(20, 92, 70, 0.08);
    stroke: rgba(20, 92, 70, 0.55);
    stroke-width: 2;
  }

  .slide-rectangle {
    fill: rgba(91, 102, 112, 0.12);
    stroke: rgba(91, 102, 112, 0.65);
    stroke-width: 2;
    stroke-dasharray: 8 6;
  }

  .slide-fixed-edge {
    stroke: #2c7a55;
    stroke-width: 5;
  }

  .slide-projection {
    stroke: rgba(91, 102, 112, 0.7);
    stroke-width: 3;
  }

  .slide-a2-original {
    stroke: #2c7a55;
    stroke-width: 4;
    opacity: 0.35;
  }

  .slide-a2-ortho {
    stroke: rgba(44, 122, 85, 0.92);
    stroke-width: 4;
  }

  .slide-ac-original {
    stroke: rgba(209, 73, 91, 0.35);
    stroke-width: 4;
  }

  .slide-ac-ortho {
    stroke: rgba(209, 73, 91, 0.92);
    stroke-width: 4;
  }

  .slide-moving-side {
    opacity: 0.92;
  }

  .slide-motion-label {
    fill: #d1495b;
  }

  .slide-fixed-label,
  .slide-a2-label {
    fill: #2c7a55;
  }

  .slide-a2-ortho-label {
    fill: rgba(44, 122, 85, 0.92);
  }

  .slide-ac-label {
    fill: rgba(209, 73, 91, 0.5);
  }

  .slide-ac-ortho-label {
    fill: rgba(209, 73, 91, 0.92);
  }

  .reflect-mirror-line {
    stroke: rgba(173, 181, 189, 0.9);
    stroke-width: 2;
    stroke-dasharray: 9 7;
  }
</style>
            <title id="slide-title">Sliding OA to DE while holding BC fixed preserves area</title>
            <desc id="slide-desc">Animated shear showing one side of the parallelogram sliding to form a rectangle with the same area.</desc>
            <defs>
              <marker id="arrow-red-slide" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#d1495b"></path>
              </marker>
            </defs>
            <rect x="0" y="0" width="520" height="360" rx="24" fill="rgba(255,255,255,0.72)"></rect>
            <g stroke="rgba(88,101,106,0.14)" stroke-width="1">
              <line x1="70" y1="40" x2="70" y2="320"></line>
              <line x1="140" y1="40" x2="140" y2="320"></line>
              <line x1="210" y1="40" x2="210" y2="320"></line>
              <line x1="280" y1="40" x2="280" y2="320"></line>
              <line x1="350" y1="40" x2="350" y2="320"></line>
              <line x1="420" y1="40" x2="420" y2="320"></line>
              <line x1="40" y1="300" x2="470" y2="300"></line>
              <line x1="40" y1="240" x2="470" y2="240"></line>
              <line x1="40" y1="180" x2="470" y2="180"></line>
              <line x1="40" y1="120" x2="470" y2="120"></line>
              <line x1="40" y1="60" x2="470" y2="60"></line>
            </g>
            <g stroke="#58656a" stroke-width="2">
              <line x1="40" y1="300" x2="470" y2="300"></line>
              <line x1="70" y1="320" x2="70" y2="40"></line>
            </g>
            <polygon points="70,300 140,180 350,120 280,240" class="slide-parallelogram">
              <animate attributeName="opacity" values="1;0.4;1" dur="3.2s" repeatCount="indefinite" />
            </polygon>
            <polygon points="175,270 140,180 350,120 385,210" class="slide-rectangle">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite" />
            </polygon>
            <line x1="140" y1="180" x2="350" y2="120" class="slide-fixed-edge"></line>
            <line x1="140" y1="180" x2="175" y2="270" class="slide-projection"></line>
            <line x1="350" y1="120" x2="385" y2="210" class="slide-projection"></line>
            <line x1="70" y1="300" x2="140" y2="180" class="slide-a2-original"></line>
            <line x1="280" y1="240" x2="350" y2="120" class="slide-ac-original"></line>
            <line x1="70" y1="300" x2="140" y2="180" class="slide-a2-ortho" marker-end="url(#arrow-green-proj)">
              <animate attributeName="x1" values="70;175;70" dur="3.2s" repeatCount="indefinite" />
              <animate attributeName="y1" values="300;270;300" dur="3.2s" repeatCount="indefinite" />
            </line>
            <line x1="350" y1="120" x2="280" y2="240" class="slide-ac-ortho">
              <animate attributeName="x2" values="280;385;280" dur="3.2s" repeatCount="indefinite" />
              <animate attributeName="y2" values="240;210;240" dur="3.2s" repeatCount="indefinite" />
            </line>
            <g class="slide-moving-side slide-moving-oa">
              <animateTransform
                attributeName="transform"
                type="translate"
                values="0 0; 105 -30; 0 0"
                dur="3.2s"
                repeatCount="indefinite" />
              <line x1="70" y1="300" x2="280" y2="240" stroke="#d1495b" stroke-width="4" marker-end="url(#arrow-red-slide)"></line>
              <circle cx="70" cy="300" r="5" fill="#145c46" stroke="#fffaf2" stroke-width="2"></circle>
              <circle cx="280" cy="240" r="5" fill="#145c46" stroke="#fffaf2" stroke-width="2"></circle>
            </g>
            <g fill="#145c46" stroke="#fffaf2" stroke-width="2">
              <circle cx="140" cy="180" r="5"></circle>
              <circle cx="350" cy="120" r="5"></circle>
              <circle cx="175" cy="270" r="4"></circle>
              <circle cx="385" cy="210" r="4"></circle>
              <circle cx="70" cy="300" r="5">
                <animate attributeName="cx" values="70;175;70" dur="3.2s" repeatCount="indefinite" />
                <animate attributeName="cy" values="300;270;300" dur="3.2s" repeatCount="indefinite" />
              </circle>
              <circle cx="280" cy="240" r="5">
                <animate attributeName="cx" values="280;385;280" dur="3.2s" repeatCount="indefinite" />
                <animate attributeName="cy" values="240;210;240" dur="3.2s" repeatCount="indefinite" />
              </circle>
            </g>
            <text x="286" y="254" class="figure-vertex-label">A</text>
            <text x="126" y="174" class="figure-vertex-label">B</text>
            <text x="360" y="116" class="figure-vertex-label">C</text>
            <text x="86" y="314" class="figure-vertex-label">O</text>
            <text x="184" y="286" class="figure-vertex-label">D</text>
            <text x="392" y="226" class="figure-vertex-label">E</text>
            <text x="474" y="305" class="figure-axis-label">x</text>
            <text x="62" y="34" class="figure-axis-label">y</text>
          </svg>
